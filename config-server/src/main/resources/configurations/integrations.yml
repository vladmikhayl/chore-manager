# the name of this file must be exactly like the name of the application

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
  instance:
    prefer-ip-address: true

spring:
  datasource:
    url: ${INTEGRATIONS_DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

telegram:
  bot-api-url: https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}
  webhook-secret: ${TELEGRAM_WEBHOOK_SECRET}

security:
  internal:
    token: ${INTERNAL_TOKEN}

alice:
  link-page-url: ${ALICE_LINK_PAGE_URL}
  oauth:
    client-id: ${ALICE_CLIENT_ID}
    client-secret: ${ALICE_CLIENT_SECRET}