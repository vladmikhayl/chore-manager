# the name of this file must be exactly like the name of the application

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
  instance:
    prefer-ip-address: true

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: identity
          uri: lb://IDENTITY
          predicates:
            - Path=/api/v1/auth/**,/api/v1/me/**

        - id: identity-internal
          uri: lb://IDENTITY
          predicates:
            - Path=/api/v1/internal/users/**,/api/v1/internal/telegram/**
          filters:
            - InternalToken

        - id: identity-openapi
          uri: lb://IDENTITY
          predicates:
            - Path=/v3/api-docs/identity
          filters:
            - SetPath=/v3/api-docs

        - id: task-management
          uri: lb://TASK-MANAGEMENT
          predicates:
            - Path=/api/v1/lists/**,/api/v1/invites/**,/api/v1/tasks/**

        - id: task-management-internal
          uri: lb://TASK-MANAGEMENT
          predicates:
            - Path=/api/v1/internal/tasks-for-users,/api/v1/internal/tasks/**
          filters:
            - InternalToken

        - id: task-management-openapi
          uri: lb://TASK-MANAGEMENT
          predicates:
            - Path=/v3/api-docs/task-management
          filters:
            - SetPath=/v3/api-docs

        - id: integrations
          uri: lb://INTEGRATIONS
          predicates:
            - Path=/api/v1/integrations/**,/api/v1/alice/**

        - id: integrations-openapi
          uri: lb://INTEGRATIONS
          predicates:
            - Path=/v3/api-docs/integrations
          filters:
            - SetPath=/v3/api-docs

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Identity
        url: /v3/api-docs/identity
      - name: Task management
        url: /v3/api-docs/task-management
      - name: Integrations
        url: /v3/api-docs/integrations

logging:
  level:
    org.springframework.cloud.gateway: INFO

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl: ${JWT_TTL_SECONDS}
  internal:
    token: ${INTERNAL_TOKEN}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}